<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A" />
      <stop offset="100%" style="stop-color:#1E1B4B" />
    </linearGradient>
  </defs>
  
  <!-- Balanced Circular Base -->
  <circle cx="256" cy="256" r="250" fill="url(#boxGrad)"/>
  
  <!-- Stylized Ballot Box -->
  <path d="M120 320 h272 v80 c0 15-10 25-25 25 h-222 c-15 0-25-10-25-25 z" fill="#FFFFFF" opacity="0.9"/>
  <path d="M140 320 l20-80 h192 l20 80 z" fill="#FFFFFF"/>
  
  <!-- The Slot -->
  <rect x="200" y="300" width="112" height="12" rx="6" fill="#1E3A8A" opacity="0.3"/>
  
  <!-- Saffron Ballot being dropped -->
  <rect x="236" y="100" width="40" height="150" rx="4" fill="#F49E0B" transform="rotate(-15 256 180)"/>
  
  <!-- Aesthetic highlight -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#F49E0B" stroke-width="4" opacity="0.2"/>
